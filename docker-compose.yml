services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8000:8000"   # Faqat localhost — Nginx proxy qiladi
    env_file:
      - backend/.env
    environment:
      - PORT=8000
    volumes:
      - media:/app/media
      - cache:/app/cache
      - db:/app/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["python", "bot/run_bot.py"]
    env_file:
      - backend/.env
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    volumes:
      - db:/app/db
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  media:
  cache:
  db:
