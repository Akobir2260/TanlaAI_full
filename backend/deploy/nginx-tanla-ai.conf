server {
    server_name tanla-ai.ardentsoft.uz 85.54.29.96;

    client_max_body_size 100M;

    location = /favicon.ico { access_log off; log_not_found off; }

    location /static/ {
        alias /var/www/tanlaAI-backend/staticfiles/;
    }

    location /media/ {
        alias /var/www/tanlaAI-backend/media/;
    }

    location / {
        include proxy_params;
        proxy_pass http://unix:/var/www/tanlaAI-backend/tanlaai.sock;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/tanla-ai.ardentsoft.uz/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/tanla-ai.ardentsoft.uz/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = tanla-ai.ardentsoft.uz) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name tanla-ai.ardentsoft.uz 85.54.29.96;
    return 404; # managed by Certbot


}